name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    permissions:
      contents: write
    strategy:
      matrix:
        target:
          - x86_64-linux
          - aarch64-linux
          - x86_64-macos
          - aarch64-macos
          - x86_64-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.0
      - run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe
      - name: Package archive
        run: |
          ARCHIVE="gctl-${GITHUB_REF_NAME}-${{ matrix.target }}"
          case "${{ matrix.target }}" in
            *-windows)
              cp zig-out/bin/gctl.exe "${ARCHIVE}.exe"
              zip "${ARCHIVE}.zip" "${ARCHIVE}.exe"
              rm "${ARCHIVE}.exe"
              ;;
            *)
              tar czf "${ARCHIVE}.tar.gz" -C zig-out/bin gctl
              ;;
          esac
      - uses: softprops/action-gh-release@v2
        with:
          files: gctl-*
