name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    strategy:
      matrix:
        target:
          - x86_64-linux
          - aarch64-linux
          - x86_64-macos
          - aarch64-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.0
      - run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe
      - uses: softprops/action-gh-release@v2
        with:
          files: zig-out/bin/gctl*
